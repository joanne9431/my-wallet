<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡本地記帳 Pro v3</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="本地記帳">

    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --danger: #ff4d4f;
            --success: #2ecc71;
            --warning: #f1c40f;
            --text: #333333;
            --grey: #e1e4e8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 50px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; font-size: 1.1rem; color: #666; font-weight: 600; }
        .total-amount { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 1rem;
            -webkit-appearance: none;
        }
        input:focus { outline: none; border-color: var(--primary); }
        
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
        
        .btn-save { background-color: var(--primary); color: white; }
        .btn-backup { background-color: var(--success); color: white; margin-top: 15px; }
        
        /* 分類選取器與小按鈕 */
        .category-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .category-btn {
            flex: 1 1 calc(33.33% - 10px);
            background-color: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--grey);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin: 0;
            position: relative;
        }
        .category-btn .icon-label { font-size: 1.2rem; }
        .category-btn .label { font-size: 0.9rem; font-weight: bold; }
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* 分類右上角的刪除小叉叉 */
        .delete-cat-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 快速新增分類區域 */
        .add-cat-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-cat-group input { margin: 0; flex: 2; }
        .add-cat-group button { margin: 0; flex: 1; padding: 12px; background: #5c6b73; color: white;}

        /* 編輯狀態提示 */
        .edit-mode-indicator {
            display: none;
            background-color: var(--warning);
            color: #333;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* 歷史紀錄 */
        .list-container { max-height: 300px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        .tag { background: #eef2f7; padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; align-self: flex-start; color: #555;}
        .date { color: #aaa; font-size: 0.75rem; margin-top: 4px; }
        .item-right { display: flex; align-items: center; gap: 8px; }
        .amount { font-weight: 700; font-size: 1.1rem; margin-right: 5px; }
        
        .btn-action { background: none; padding: 5px; margin: 0; width: auto; font-size: 0.95rem; display: inline-block;}
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 10px); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>本月總花費</h2>
        <div class="total-amount">$<span id="total">0</span></div>
    </div>

    <div class="card">
        <h2 id="form-title">新增消費</h2>
        <div id="edit-indicator" class="edit-mode-indicator">✏️ 正在修改歷史紀錄... (儲存後覆蓋)</div>
        
        <input type="number" id="amount" placeholder="輸入金額" inputmode="decimal">
        
        <div class="category-picker" id="category-picker"></div>
        
        <div class="add-cat-group">
            <input type="text" id="new-cat-input" placeholder="例: 💡 補習 (含圖示)">
            <button type="button" onclick="addNewCategory()">+ 分類</button>
        </div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">儲存紀錄</button>
    </div>

    <div class="card">
        <h2>歷史紀錄</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 10px;">
        <button class="btn-backup" onclick="exportToCSV()">備份資料 (匯出 Excel CSV)</button>
    </div>

    <script>
        // 本地儲存的檔案名稱
        const DATA_FILE = "accounting_records_v3.json";
        const CAT_FILE = "accounting_categories_v3.json";
        
        let records = [];
        // 預設的初始分類列表（如果本地沒存過，就用這組）
        let categories = ["🍔 餐飲", "🚗 交通", "🎬 娛樂", "🛍️ 購物", "🏠 居家", "📦 其他"];
        
        let selectedCategory = ""; 
        let editingRecordId = null; // 用來標記目前是否正在「修改資料」

        // 初始化
        async function init() {
            await loadCategories();
            await loadRecords();
            renderCategories();
            renderRecords();
        }

        // ================= 資料儲存/讀取核心 (OPFS 安全隔離) =================
        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                records = JSON.parse(localStorage.getItem('acc_rec_v3')) || [];
            }
        }

        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                localStorage.setItem('acc_rec_v3', JSON.stringify(records));
            }
        }

        async function loadCategories() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(CAT_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                if (text) categories = JSON.parse(text);
            } catch (e) {
                const local = localStorage.getItem('acc_cat_v3');
                if (local) categories = JSON.parse(local);
            }
            if(categories.length > 0) selectedCategory = categories[0];
        }

        async function saveCategories() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(CAT_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(categories));
                await writable.close();
            } catch (e) {
                localStorage.setItem('acc_cat_v3', JSON.stringify(categories));
            }
        }

        // ================= 分類自訂管理邏輯 =================
        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = '';
            
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                // 將 "🍔 餐飲" 拆開成圖示和文字，如果沒輸入圖示就整串顯示
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                        <span class="delete-cat-badge" onclick="deleteCategory('${cat}', event)">X</span>
                    </button>
                `;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function addNewCategory() {
            const input = document.getElementById('new-cat-input');
            const val = input.value.trim();
            if(!val) return alert('請輸入分類名稱！');
            if(categories.includes(val)) return alert('此分類已存在！');
            
            categories.push(val);
            selectedCategory = val; // 自動選中新分類
            input.value = '';
            await saveCategories();
            renderCategories();
        }

        async function deleteCategory(cat, event) {
            event.stopPropagation(); // 阻止觸發選擇分類的點擊事件
            if(confirm(`確定要刪除「${cat}」這個分類選項嗎？\n(不會影響已輸入的歷史帳目)`)) {
                categories = categories.filter(c => c !== cat);
                if(selectedCategory === cat && categories.length > 0) {
                    selectedCategory = categories[0];
                }
                await saveCategories();
                renderCategories();
            }
        }

        // ================= 記帳資料輸入與「修改」核心邏輯 =================
        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const amount = parseFloat(amountInput.value);
            
            if (isNaN(amount) || amount <= 0) return alert('請輸入正確的金額！');

            if (editingRecordId !== null) {
                // 【編輯模式】 修改現有資料
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = amount;
                    records[recordIndex].category = selectedCategory;
                    // 保持原本日期不變
                }
                // 結束編輯模式，重設狀態
                editingRecordId = null;
                document.getElementById('form-title').innerText = "新增消費";
                document.getElementById('btn-save-main').innerText = "儲存紀錄";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none";
            } else {
                // 【正常模式】 新增一筆
                const newRecord = {
                    id: Date.now(),
                    amount: amount,
                    category: selectedCategory,
                    date: new Date().toLocaleDateString()
                };
                records.unshift(newRecord);
            }

            await saveRecords();
            amountInput.value = '';
            renderRecords();
        }

        // 觸發編輯功能：把舊資料帶回表單
        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; // 設定目前正在編輯的 ID
            
            // 1. 把數值填回輸入框
            document.getElementById('amount').value = record.amount;
            
            // 2. 把選取分類切換過去（如果該分類已被刪除，則自動暫時加回選單）
            if(!categories.includes(record.category)) {
                categories.push(record.category);
                saveCategories();
                renderCategories();
            }
            selectedCategory = record.category;
            
            // 3. 更新 UI 介面，讓使用者知道現在是「修改狀態」
            document.getElementById('form-title').innerText = "修改歷史紀錄";
            document.getElementById('btn-save-main').innerText = "更新（覆蓋）紀錄";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            
            // 重新渲染分類按鈕來更新 active 狀態
            renderCategories();
            
            // 畫面自動滾動回頂部輸入框
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                records = records.filter(r => r.id !== id);
                await saveRecords();
                renderRecords();
            }
        }

        // ================= 渲染歷史紀錄 =================
        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            
            listContainer.innerHTML = '';
            let total = 0;

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">目前尚無消費紀錄</div>`;
                totalContainer.innerText = '0';
                return;
            }

            records.forEach(r => {
                total += r.amount;
                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag">${r.category}</span>
                            <span class="date">${r.date}</span>
                        </div>
                        <div class="item-right">
                            <span class="amount">$${r.amount.toLocaleString()}</span>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalContainer.innerText = total.toLocaleString();
        }

        // 匯出 CSV 備份
        function exportToCSV() {
            if (records.length === 0) return alert("目前沒有任何資料可以匯出喔！");
            let csvContent = "\uFEFF日期,消費分類,金額\n"; 
            records.forEach(r => {
                const category = r.category.includes(',') ? `"${r.category}"` : r.category;
                csvContent += `${r.date},${category},${r.amount}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `本地記帳本備份_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>

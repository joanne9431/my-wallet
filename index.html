<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        /* 全域變數（森林系 / 大地色主題） */
        :root {
            --bg-color: #f1f4f1;   /* 溫和的淡草地綠灰 */
            --card-bg: #ffffff;    
            --primary: #3a5f43;    /* 沉穩森林深綠 */
            --primary-light: #e8eee9;
            --text-main: #2c3e31;
            --text-muted: #708573;
            --accent: #8fbc8f;     /* 嫩綠色 */
            --danger: #bc8f8f;     /* 霧粉紅 */
            --shadow: 0 8px 24px rgba(58, 95, 67, 0.06);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
            text-align: center;
        }

        .file-input-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--accent);
            padding: 40px 20px;
            border-radius: var(--radius);
            background: var(--primary-light);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input-container:hover {
            background: #e0eae2;
            border-color: var(--primary);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(58, 95, 67, 0.2);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(58, 95, 67, 0.3);
        }

        #status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status-success {
            background-color: #d4edda;
            color: #155724;
            display: block !important;
        }

        .status-error {
            background-color: #f8d7da;
            color: #721c24;
            display: block !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>匯入記帳範本標題</h1>
        
        <label class="file-input-container" for="excel-file">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span style="color: var(--text-main); font-weight: 500;">選擇或拖放 Excel 檔案</span>
            <span style="color: var(--text-muted); font-size: 12px;">（系統將只讀取第一行作為欄位結構）</span>
            <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
        </label>

        <div id="status-message"></div>
    </div>

    <script>
        document.getElementById('excel-file').addEventListener('change', handleFile, false);

        function showMessage(text, isSuccess) {
            const msgDiv = document.getElementById('status-message');
            msgDiv.innerText = text;
            msgDiv.className = isSuccess ? 'status-success' : 'status-error';
        }

        function handleFile(e) {
            const files = e.target.value ? e.target.files : e.dataTransfer.files;
            if (!files || files.length === 0) return;
            
            const file = files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 獲取第一個工作表 (Sheet)
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 將工作表轉換為二維陣列 (Arrays of Arrays)
                    const jsonRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    if (jsonRows.length === 0) {
                        showMessage('失敗：檔案內容為空。', false);
                        return;
                    }

                    // 【核心修改】：只准許/抽取第一行資料 (標題列)
                    const firstRow = jsonRows[0]; 

                    // 驗證第一行是否符合預期的記帳結構 (例如檢查是否有 Date, Category 等)
                    const expectedHeaders = ["Date", "Category", "Amount", "Notes"];
                    const hasValidHeaders = expectedHeaders.every(h => firstRow.includes(h));

                    if (!hasValidHeaders) {
                        showMessage(`匯入失敗！第一行必須包含結構: ${expectedHeaders.join(', ')}`, false);
                        return;
                    }

                    // 成功處理第一行
                    console.log("成功讀取第一行結構：", firstRow);
                    showMessage(`成功匯入第一行結構！欄位：${firstRow.filter(Boolean).join(', ')}`, true);
                    
                    // 在這裡可以將 firstRow 儲存到 localStorage 或用於初始化你的系統表格
                    // localStorage.setItem('budget_headers', JSON.stringify(firstRow));

                } catch (error) {
                    console.error(error);
                    showMessage('讀取檔案時發生錯誤，請確保是正確的 Excel/CSV 檔案。', false);
                }
            };

            reader.readAsArrayBuffer(file);
        }

        // 支援拖曳上傳
        const dropZone = document.querySelector('.file-input-container');
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => { e.preventDefault(); dropZone.style.background = '#e0eae2'; }, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => { e.preventDefault(); dropZone.style.background = 'var(--primary-light)'; }, false);
        });
        dropZone.addEventListener('drop', handleFile, false);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">

    <style>
        /* 全域變數（顏色主題） */
        :root {
            --bg-color: #f5f7fa;   
            --card-bg: #ffffff;    
            --primary: #4a90e2;    
            --danger: #ff4d4f;     
            --success: #2ecc71;    
            --warning: #f1c40f;    
            --text: #333333;       
            --grey: #e1e4e8;       
            
            /* 各種消費種類的 Highlight 顏色背景 */
            --hl-food: #ffeaf0;    /* Food: 粉紅色 */
            --hl-food-txt: #d6336c;
            --hl-trans: #e7f5ff;   /* Transport: 粉藍色 */
            --hl-trans-txt: #1c7ed6;
            --hl-play: #f3f0ff;    /* Entertainment: 粉紫色 */
            --hl-play-txt: #7048e8;
            --hl-shop: #fff4e6;    /* Shopping: 粉橘色 */
            --hl-shop-txt: #f76707;
            --hl-home: #e6fcf5;    /* Home: 粉綠色 */
            --hl-home-txt: #0ca678;
            --hl-other: #f1f3f5;   /* Others: 淺灰色 */
            --hl-other-txt: #495057;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            padding-top: 0; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 10px;
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -10px;
            margin-right: -10px;
            margin-bottom: 12px;
            padding: 15px 12px;
            background: linear-gradient(135deg, #ffffff 0%, #fafdff 100%);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        
        h2 { margin-top: 0; font-size: 0.9rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        
        .dashboard-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .total-box {
            flex: 1;
            padding-left: 20px; 
            text-align: left;
        }
        .total-amount { 
            font-size: 2rem; 
            font-weight: 900; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -1px;
        }
        
        .category-totals-box {
            flex: 1.3;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.02);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.01);
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: #555;
        }
        .cat-total-item .cat-name {
            color: #888;
            font-size: 0.7rem;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: #222;
        }
        
        input[type="number"], input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px 12px; 
            margin: 4px 0;      
            border-radius: 8px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 0.95rem;
            -webkit-appearance: none; 
        }
        input:focus { outline: none; border-color: var(--primary); } 
        
        /* 編輯日期專用樣式 */
        .edit-date-wrapper {
            display: none; 
            background: #fff8e6;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px dashed var(--warning);
            margin: 4px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: #b78103;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }
        
        button {
            width: 100%;
            padding: 11px;
            margin: 4px 0;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; } 
        
        .btn-save { background-color: var(--primary); color: white; margin-top: 6px; }
        .btn-backup { background-color: var(--success); color: white; margin-top: 6px; }
        
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 6px;       
            margin: 8px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 6px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 10px;
            padding: 8px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 2px;
            margin: 0;
        }
        .category-btn .icon-label { font-size: 1.05rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: bold; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: var(--warning);
            color: #333;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .list-container { max-height: 260px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 3px 8px; 
            border-radius: 5px; 
            font-size: 0.78rem; 
            font-weight: bold; 
            align-self: flex-start; 
        }
        
        .item-details { color: #aaa; font-size: 0.72rem; margin-top: 4px; display: flex; gap: 6px; align-items: center; }
        .note-text { color: #555; font-weight: 500; background: #fffbe6; padding: 1px 4px; border-radius: 4px; border: 1px solid #ffe58f; } 

        .item-right { display: flex; align-items: center; gap: 6px; }
        .amount { font-weight: 700; font-size: 1rem; margin-right: 2px; }
        .btn-action { background: none; padding: 4px; margin: 0; width: auto; font-size: 0.9rem; display: inline-block;}
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 6px); } }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2>Monthly Total</h2>
                <div class="total-amount">HK$<span id="total">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="card">
        <h2 id="form-title">Add Transaction</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ Editing historical record... (will overwrite on save)</div>
        
        <input type="number" id="amount" placeholder="Enter amount" inputmode="decimal">
        <input type="text" id="note" placeholder="Enter notes (e.g., restaurant name, item name)">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Modify Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <h2>History Logs</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px;">
        <button class="btn-backup" onclick="exportToCSV()">Backup Data (Export Excel CSV)</button>
    </div>

    <script>
        const DATA_FILE = "accounting_records_v5.json"; 
        
        // 分類選單（英文版面）
        let categories = ["🍔 Food", "🚗 Transport", "🎬 Entertainment", "🛍️ Shopping", "🏠 Home", "📦 Others"];
        
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 

        // 供 CSV 轉換使用的英文月份名稱對照
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // 初始化
        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            await loadRecords();     
            renderCategories();   
            renderRecords();      
        }

        // 讀取本地硬碟檔案
        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                console.error("OPFS 讀取失敗:", e);
                records = JSON.parse(localStorage.getItem('acc_rec_v5')) || [];
            }
        }

        // 寫入本地硬碟檔案
        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                console.error("OPFS 寫入失敗:", e);
                localStorage.setItem('acc_rec_v5', JSON.stringify(records));
            }
        }

        // 渲染分類按鈕
        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }

        // 處理儲存與覆蓋修改
        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); 
            const dateInput = document.getElementById('edit-date');
            
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); 

            if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount!');

            if (editingRecordId !== null) {
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = amount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; 
                    
                    if (dateInput.value) {
                        records[recordIndex].date = dateInput.value;
                    }
                }
                
                // 依照日期最新重新排序
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
                
                editingRecordId = null;
                document.getElementById('form-title').innerText = "Add Transaction";
                document.getElementById('btn-save-main').innerText = "Save Record";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
                document.getElementById('date-field-block').style.display = "none"; 
            } else {
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const isoDateStr = `${yyyy}-${mm}-${dd}`;

                const newRecord = {
                    id: Date.now(), 
                    amount: amount,
                    category: selectedCategory,
                    note: note, 
                    date: isoDateStr 
                };
                records.unshift(newRecord);
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            }

            await saveRecords();     
            amountInput.value = '';  
            noteInput.value = '';  
            renderRecords();         
        }

        // 點擊編輯時觸發
        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; 
            document.getElementById('amount').value = record.amount;
            document.getElementById('note').value = record.note || ''; 
            document.getElementById('edit-date').value = ensureISODate(record.date); 
            selectedCategory = record.category;
            
            document.getElementById('form-title').innerText = "Edit History Record";
            document.getElementById('btn-save-main').innerText = "Update Record";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            document.getElementById('date-field-block').style.display = "block"; 
            
            renderCategories(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                renderRecords();     
            }
        }

        // 依關鍵字自動取得 Highlight 顏色樣式
        function getHighlightStyle(category) {
            const catStr = String(category);
            if (catStr.includes("Food")) {
                return "background-color: var(--hl-food); color: var(--hl-food-txt);";
            } else if (catStr.includes("Transport")) {
                return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";
            } else if (catStr.includes("Entertainment")) {
                return "background-color: var(--hl-play); color: var(--hl-play-txt);";
            } else if (catStr.includes("Shopping")) {
                return "background-color: var(--hl-shop); color: var(--hl-shop-txt);";
            } else if (catStr.includes("Home")) {
                return "background-color: var(--hl-home); color: var(--hl-home-txt);";
            } else {
                return "background-color: var(--hl-other); color: var(--hl-other-txt);";
            }
        }

        // 渲染網頁歷史紀錄清單與各大項目看板金額加總
        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            const catTotalsContainer = document.getElementById('category-totals-container');
            
            listContainer.innerHTML = ''; 
            catTotalsContainer.innerHTML = '';
            
            let total = 0;
            let catSums = {};
            categories.forEach(cat => { catSums[cat] = 0; });

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">No transactions yet.</div>`;
                totalContainer.innerText = '0';
                
                categories.forEach(cat => {
                    const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                    catTotalsContainer.innerHTML += `
                        <div class="cat-total-item">
                            <span class="cat-name">${cleanLabel}</span>
                            <span class="cat-num">HK$0</span>
                        </div>`;
                });
                return;
            }

            records.forEach(r => {
                total += r.amount;
                
                if (catSums[r.category] !== undefined) {
                    catSums[r.category] += r.amount;
                } else {
                    catSums[r.category] = r.amount;
                }

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';
                const colorStyle = getHighlightStyle(r.category);
                const displayCategoryLabel = r.category.split(' ').slice(1).join(' ') || r.category;

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${colorStyle}">${displayCategoryLabel}</span>
                            <div class="item-details">
                                <span>${r.date}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="amount">HK$${r.amount.toLocaleString()}</span>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalContainer.innerText = total.toLocaleString();

            Object.keys(catSums).forEach(cat => {
                const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                catTotalsContainer.innerHTML += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cleanLabel}</span>
                        <span class="cat-num">HK$${catSums[cat].toLocaleString()}</span>
                    </div>
                `;
            });
        }

        // 安全確保 ISO 日期格式
        function ensureISODate(dateStr) {
            if (dateStr && dateStr.includes('-') && dateStr.split('-').length === 3) {
                return dateStr;
            }
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "2026-06-01"; 
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            } catch(e) {
                return "2026-06-01";
            }
        }

        // 匯出 CSV 流程 (包含英文統計標籤，第一欄維持留白)
        function exportToCSV() {
            if (records.length === 0) return alert("There is no data to export yet!");
            
            let sortedRecords = [...records].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);
            let csvContent = "\uFEFFDate,Category,Amount,Notes\n"; 
            
            let lastIsoDate = "";
            let dayTotal = 0;
            let monthTotal = 0;
            let yearTotal = 0;

            for (let i = 0; i < sortedRecords.length; i++) {
                const r = sortedRecords[i];
                const nextRecord = sortedRecords[i + 1];

                const currentIsoDate = ensureISODate(r.date);
                const parts = currentIsoDate.split('-');
                const currentYear = parts[0];
                const currentMonth = parts[1]; 
                
                const cleanMonthIdx = parseInt(currentMonth, 10) - 1;
                const EnglishMonthLabel = monthNames[cleanMonthIdx] || "Month";

                let nextYear = null;
                let nextMonth = null;
                let nextIsoDate = null;
                if (nextRecord) {
                    nextIsoDate = ensureISODate(nextRecord.date);
                    const nParts = nextIsoDate.split('-');
                    nextYear = nParts[0];
                    nextMonth = nParts[1];
                }

                // 去除分類前的 Emoji 圖示匯出
                const rawCategory = r.category.split(' ').slice(1).join(' ') || r.category;
                const category = rawCategory.includes(',') ? `"${rawCategory}"` : rawCategory;
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');
                const formattedAmount = `HK$${r.amount}`;
                
                let displayDate = "";
                if (currentIsoDate !== lastIsoDate) {
                    displayDate = currentIsoDate;
                    lastIsoDate = currentIsoDate;
                } else {
                    displayDate = ""; 
                }
                
                csvContent += `${displayDate},${category},${formattedAmount},${note}\n`;

                dayTotal += r.amount;
                monthTotal += r.amount;
                yearTotal += r.amount;

                // 當日總計 -> 第一欄留白
                if (!nextRecord || nextIsoDate !== currentIsoDate) {
                    csvContent += `,Daily Total,HK$${dayTotal},\n`;
                    dayTotal = 0; 
                }

                // 每月總計 -> 第一欄留白
                if (!nextRecord || nextYear !== currentYear || nextMonth !== currentMonth) {
                    csvContent += `,${EnglishMonthLabel} Total,HK$${monthTotal},\n`;
                    monthTotal = 0; 
                }

                // 每年總計 -> 第一欄留白
                if (!nextRecord || nextYear !== currentYear) {
                    csvContent += `,Year ${currentYear} Total,HK$${yearTotal},\n`;
                    yearTotal = 0; 
                }
            }
            
            // 下載程序啟動
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Local_Budget_Report_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>

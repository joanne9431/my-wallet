<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* 全域變數（森林系 / 大地色主題） */
        :root {
            --bg-color: #f1f4f1;   /* 溫和的淡草地綠灰 */
            --card-bg: #ffffff;    
            --primary: #3a5f43;    /* 沉穩森林深綠 */
            --primary-light: #4e7c57; /* 茂盛林葉綠 */
            --danger: #c05c46;     /* 溫暖泥土磚紅 */
            --success: #5e8c61;    /* 療癒鼠尾草綠 */
            --warning: #cca043;    /* 暖秋麥芽黃 */
            --text: #222f25;       /* 深松針墨綠 (高對比閱讀舒適) */
            --grey: #d5dbd6;       /* 淺石灰色 */
            
            /* 各種消費種類的 Highlight 顏色背景 (採用灰調低飽和的自然色彩) */
            --hl-food: #fdf2ee;    /* Food: 溫暖麥芽粉橘 */
            --hl-food-txt: #b35d46;
            --hl-trans: #eef7f6;   /* Transport: 湖水綠藍 */
            --hl-trans-txt: #3d8580;
            --hl-play: #f6f4f8;    /* Entertainment: 暮光薰衣草紫 */
            --hl-play-txt: #715c8c;
            --hl-shop: #fbf8ed;    /* Shopping: 暖秋金黃 */
            --hl-shop-txt: #a67c2e;
            --hl-home: #edf4ee;    /* Home: 森林苔蘚綠 */
            --hl-home-txt: #467a4e;
            --hl-other: #f0f2f1;   /* Others: 溪畔卵石灰 */
            --hl-other-txt: #5c635f;
        }
        
        body {
            font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            padding-top: 0; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px; 
            box-shadow: 0 4px 12px rgba(43, 58, 47, 0.04); 
            margin-bottom: 10px;
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -10px;
            margin-right: -10px;
            margin-bottom: 12px;
            padding: 18px 14px;
            background: linear-gradient(135deg, #ffffff 0%, #f7faf8 100%);
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        
        h2 { 
            margin-top: 0; 
            font-size: 0.85rem; 
            color: #6e7c71; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            margin-bottom: 8px; 
        }
        
        .dashboard-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .total-box {
            flex: 1;
            padding-left: 10px; 
            text-align: left;
        }
        .total-amount { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -0.5px;
        }
        
        .category-totals-box {
            flex: 1.3;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            background: rgba(58, 95, 67, 0.03);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(58, 95, 67, 0.05);
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: var(--text);
        }
        .cat-total-item .cat-name {
            color: #7d8c80;
            font-size: 0.68rem;
            font-weight: 600;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: var(--text);
        }
        
        input[type="number"], input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px 14px; 
            margin: 6px 0;      
            border-radius: 10px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fbfcfb;
            color: var(--text);
            transition: all 0.2s;
            -webkit-appearance: none; 
        }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(58, 95, 67, 0.1);
        } 
        
        /* 編輯日期專用樣式 */
        .edit-date-wrapper {
            display: none; 
            background: #fdfaf3;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px dashed var(--warning);
            margin: 6px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: #a67c2e;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.85; transform: scale(0.99); } 
        
        .btn-save { background-color: var(--primary); color: white; margin-top: 8px; }
        .btn-save:hover { background-color: var(--primary-light); }
        .btn-backup { background-color: var(--success); color: white; margin-top: 8px; }
        .btn-backup:hover { opacity: 0.95; }
        .btn-import { background-color: #5c635f; color: white; margin-top: 6px; }
        .btn-import:hover { opacity: 0.95; }
        
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 6px;       
            margin: 10px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 6px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 12px;
            padding: 10px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 4px;
            margin: 0;
            font-family: inherit;
        }
        .category-btn .icon-label { font-size: 1.2rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: 700; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 8px rgba(58, 95, 67, 0.2);
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: var(--warning);
            color: #3f2e0f;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .list-container { max-height: 280px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eef1ee; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            align-self: flex-start; 
        }
        
        .item-details { color: #829285; font-size: 0.72rem; margin-top: 5px; display: flex; gap: 8px; align-items: center; }
        .note-text { color: var(--text); font-weight: 600; background: #faf8f0; padding: 1px 6px; border-radius: 4px; border: 1px solid #eadebe; } 

        .item-right { display: flex; align-items: center; gap: 8px; }
        .amount { font-weight: 700; font-size: 1.05rem; margin-right: 2px; color: var(--text); }
        .btn-action { background: none; padding: 6px; margin: 0; width: auto; font-size: 0.95rem; display: inline-block; }
        .btn-action:active { transform: scale(0.9); }
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 6px); } }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2>Monthly Total</h2>
                <div class="total-amount">HK$<span id="total">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="card">
        <h2 id="form-title">Add Transaction</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ Editing historical record... (will overwrite on save)</div>
        
        <input type="number" id="amount" placeholder="Enter amount" inputmode="decimal">
        <input type="text" id="note" placeholder="Enter notes (e.g., restaurant name, item name)">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Modify Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <h2>History Logs</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px;">
        <button class="btn-backup" onclick="exportToCSV()">Backup Data (Export Excel CSV)</button>
        <input type="file" id="import-file-input" accept=".json,.csv" style="display: none;" onchange="handleFileImport(this)">
        <button class="btn-import" onclick="document.getElementById('import-file-input').click()">Import Data (JSON/CSV)</button>
    </div>

    <script>
        const DATA_FILE = "accounting_records_v5.json"; 
        
        // 分類選單（英文版面）
        let categories = ["🍔 Food", "🚗 Transport", "🎬 Entertainment", "🛍️ Shopping", "🏠 Home", "📦 Others"];
        
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 

        // 供 CSV 轉換使用的英文月份名稱對照
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // 初始化
        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            await loadRecords();     
            renderCategories();   
            renderRecords();      
        }

        // 讀取本地硬碟檔案
        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                console.error("OPFS 讀取失敗:", e);
                records = JSON.parse(localStorage.getItem('acc_rec_v5')) || [];
            }
        }

        // 寫入本地硬碟檔案
        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                console.error("OPFS 寫入失敗:", e);
                localStorage.setItem('acc_rec_v5', JSON.stringify(records));
            }
        }

        // 渲染分類按鈕
        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }

        // 處理儲存與覆蓋修改
        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); 
            const dateInput = document.getElementById('edit-date');
            
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); 

            if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount!');

            if (editingRecordId !== null) {
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = amount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; 
                    
                    if (dateInput.value) {
                        records[recordIndex].date = dateInput.value;
                    }
                }
                
                // 依照日期最新重新排序
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
                
                editingRecordId = null;
                document.getElementById('form-title').innerText = "Add Transaction";
                document.getElementById('btn-save-main').innerText = "Save Record";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
                document.getElementById('date-field-block').style.display = "none"; 
            } else {
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const isoDateStr = `${yyyy}-${mm}-${dd}`;

                const newRecord = {
                    id: Date.now(), 
                    amount: amount,
                    category: selectedCategory,
                    note: note, 
                    date: isoDateStr 
                };
                records.unshift(newRecord);
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            }

            await saveRecords();     
            amountInput.value = '';  
            noteInput.value = '';  
            renderRecords();         
        }

        // 點擊編輯時觸發
        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; 
            document.getElementById('amount').value = record.amount;
            document.getElementById('note').value = record.note || ''; 
            document.getElementById('edit-date').value = ensureISODate(record.date); 
            selectedCategory = record.category;
            
            document.getElementById('form-title').innerText = "Edit History Record";
            document.getElementById('btn-save-main').innerText = "Update Record";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            document.getElementById('date-field-block').style.display = "block"; 
            
            renderCategories(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                renderRecords();     
            }
        }

        // 依關鍵字自動取得 Highlight 顏色樣式
        function getHighlightStyle(category) {
            const catStr = String(category);
            if (catStr.includes("Food")) {
                return "background-color: var(--hl-food); color: var(--hl-food-txt);";
            } else if (catStr.includes("Transport")) {
                return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";
            } else if (catStr.includes("Entertainment")) {
                return "background-color: var(--hl-play); color: var(--hl-play-txt);";
            } else if (catStr.includes("Shopping")) {
                return "background-color: var(--hl-shop); color: var(--hl-shop-txt);";
            } else if (catStr.includes("Home")) {
                return "background-color: var(--hl-home); color: var(--hl-home-txt);";
            } else {
                return "background-color: var(--hl-other); color: var(--hl-other-txt);";
            }
        }

        // 渲染網頁歷史紀錄清單與各大項目看板金額加總
        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            const catTotalsContainer = document.getElementById('category-totals-container');
            
            listContainer.innerHTML = ''; 
            catTotalsContainer.innerHTML = '';
            
            let total = 0;
            let catSums = {};
            categories.forEach(cat => { catSums[cat] = 0; });

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #829285; text-align: center; padding: 20px; font-size: 0.9rem;">No transactions yet.</div>`;
                totalContainer.innerText = '0';
                
                categories.forEach(cat => {
                    const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                    catTotalsContainer.innerHTML += `
                        <div class="cat-total-item">
                            <span class="cat-name">${cleanLabel}</span>
                            <span class="cat-num">HK$0</span>
                        </div>`;
                });
                return;
            }

            records.forEach(r => {
                total += r.amount;
                
                if (catSums[r.category] !== undefined) {
                    catSums[r.category] += r.amount;
                } else {
                    catSums[r.category] = r.amount;
                }

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';
                const colorStyle = getHighlightStyle(r.category);
                const displayCategoryLabel = r.category.split(' ').slice(1).join(' ') || r.category;

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${colorStyle}">${displayCategoryLabel}</span>
                            <div class="item-details">
                                <span>${r.date}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="amount">HK$${r.amount.toLocaleString()}</span>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalContainer.innerText = total.toLocaleString();

            Object.keys(catSums).forEach(cat => {
                const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                catTotalsContainer.innerHTML += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cleanLabel}</span>
                        <span class="cat-num">HK$${catSums[cat].toLocaleString()}</span>
                    </div>
                `;
            });
        }

        // 安全確保 ISO 日期格式
        function ensureISODate(dateStr) {
            if (dateStr && dateStr.includes('-') && dateStr.split('-').length === 3) {
                return dateStr;
            }
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "2026-06-01"; 
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            } catch(e) {
                return "2026-06-01";
            }
        }

        // 處理資料匯入 (支援 JSON 與從此系統導出的 CSV)
        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const text = e.target.result;
                try {
                    if (file.name.endsWith('.json')) {
                        const parsed = JSON.parse(text);
                        if (Array.isArray(parsed)) {
                            records = parsed;
                        } else {
                            throw new Error("Invalid JSON format");
                        }
                    } else if (file.name.endsWith('.csv')) {
                        // 簡單解析從本系統導出的 CSV 檔案
                        const lines = text.split('\n');
                        const importedRecords = [];
                        
                        for (let i = 1; i < lines.length; i++) {
                            let line = lines[i].trim();
                            if (!line) continue;
                            
                            // 移除 BOM 
                            if (line.startsWith('\uFEFF')) line = line.replace('\uFEFF', '');
                            
                            // 以逗號分割（不考慮複雜引號，因為本系統常規備份足夠使用）
                            const cols = line.split(',');
                            if (cols.length < 3) continue;
                            
                            const dateStr = cols[0].trim();
                            const catLabel = cols[1].trim();
                            let amtStr = cols[2].trim();
                            const noteStr = cols[3] ? cols[3].replace(/"/g, '').trim() : '';
                            
                            // 跳過匯出時自動生成的各式 Total 計算行與空行
                            if (!dateStr || catLabel.includes('Total') || catLabel === '') continue;
                            
                            amtStr = amtStr.replace('HK$', '').replace(/"/g, '');
                            const amount = parseFloat(amtStr);
                            if (isNaN(amount)) continue;
                            
                            // 匹配回原本帶有標籤的完整分類名
                            let finalCategory = categories.find(c => c.includes(catLabel)) || "📦 Others";
                            
                            importedRecords.push({
                                id: Date.now() + i,
                                amount: amount,
                                category: finalCategory,
                                note: noteStr,
                                date: ensureISODate(dateStr)
                            });
                        }
                        
                        if (importedRecords.length === 0) {
                            alert("No valid records found in CSV!");
                            return;
                        }
                        records = importedRecords;
                    }

                    // 重新排序並儲存
                    records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
                    await saveRecords();
                    renderRecords();
                    alert(`Successfully imported ${records.length} records!`);
                } catch(err) {
                    alert("Import failed! Please make sure the file format matches.");
                    console.error(err);
                }
                input.value = ''; // 清空檔案選取狀態
            };
            reader.readAsText(file);
        }

        // 匯出 CSV 流程 (高度客製化空行間隔、同時「統一每行顯示完整日期」)
        function exportToCSV() {
            if (records.length === 0) return alert("There is no data to export yet!");
            
            let sortedRecords = [...records].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);
            let csvContent = "\uFEFFDate,Category,Amount,Notes\n"; 
            
            let dayTotal = 0;
            let monthTotal = 0;
            let yearTotal = 0;

            for (let i = 0; i < sortedRecords.length; i++) {
                const r = sortedRecords[i];
                const nextRecord = sortedRecords[i + 1];

                const currentIsoDate = ensureISODate(r.date);
                const parts = currentIsoDate.split('-');
                const currentYear = parts[0];
                const currentMonth = parts[1]; 
                
                const cleanMonthIdx = parseInt(currentMonth, 10) - 1;
                const EnglishMonthLabel = monthNames[cleanMonthIdx] || "Month";

                let nextYear = null;
                let nextMonth = null;
                let nextIsoDate = null;
                if (nextRecord) {
                    nextIsoDate = ensureISODate(nextRecord.date);
                    const nParts = nextIsoDate.split('-');
                    nextYear = nParts[0];
                    nextMonth = nParts[1];
                }

                // 去除分類前的 Emoji 圖示匯出
                const rawCategory = r.category.split(' ').slice(1).join(' ') || r.category;
                const category = rawCategory.includes(',') ? `"${rawCategory}"` : rawCategory;
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');
                const formattedAmount = `HK$${r.amount}`;
                
                // 【修正：統一日期格式】不論是否重複，每一行均完整印出 YYYY-MM-DD
                csvContent += `${currentIsoDate},${category},${formattedAmount},${note}\n`;

                dayTotal += r.amount;
                monthTotal += r.amount;
                yearTotal += r.amount;

                const isDayEnd = !nextRecord || nextIsoDate !== currentIsoDate;
                const isMonthEnd = !nextRecord || nextYear !== currentYear || nextMonth !== currentMonth;
                const isYearEnd = !nextRecord || nextYear !== currentYear;

                // 1. 當日總計 -> 隨後插入一行空行（,,,\n），達成每日數據與下日數據間有空行
                if (isDayEnd) {
                    csvContent += `,Daily Total,HK$${dayTotal},\n`;
                    dayTotal = 0; 
                    csvContent += ",,,\n"; 
                }

                // 2. 每月總計
                if (isMonthEnd) {
                    csvContent += `,${EnglishMonthLabel} Total,HK$${monthTotal},\n`;
                    monthTotal = 0; 
                    
                    // 滿足需求：在 monthly 和 year total 數據之間空白一行。
                    // 如果同時是年結尾，我們先把 Monthly Total 印出，再補一行空行，隨後才由下方 logic 輸出 Year Total
                    if (isYearEnd) {
                        csvContent += ",,,\n";
                    }
                }

                // 3. 每年總計 -> 刪除 "Year" 字眼，直接輸出 "2026 Total"
                if (isYearEnd) {
                    csvContent += `,${currentYear} Total,HK$${yearTotal},\n`;
                    yearTotal = 0; 
                    
                    if (nextRecord) {
                        csvContent += ",,,\n";
                    }
                }
            }
            
            // 下載程序啟動
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Local_Budget_Report_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>

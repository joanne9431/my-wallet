<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡本地記帳 Pro v2</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="本地記帳">

    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --danger: #ff4d4f;
            --success: #2ecc71;
            --text: #333333;
            --grey: #e1e4e8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 50px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; font-size: 1.1rem; color: #666; font-weight: 600; }
        .total-amount { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        
        /* 輸入框樣式 */
        input[type="number"] {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 1rem;
            -webkit-appearance: none;
        }
        input:focus { outline: none; border-color: var(--primary); }
        
        /* 核心按鈕樣式 */
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
        
        /* 儲存和備份按鈕樣式 */
        .btn-save { background-color: var(--primary); color: white; }
        .btn-backup { background-color: var(--success); color: white; margin-top: 15px; }
        
        /* 新增分類選取器樣式 */
        .category-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .category-btn {
            flex: 1 1 calc(33.33% - 10px); /* 默認一行三個 */
            background-color: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--grey);
            border-radius: 12px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin: 0; /* 覆蓋全域按鈕邊距 */
        }
        .category-btn .icon { font-size: 2rem; }
        .category-btn .label { font-size: 0.95rem; font-weight: bold; }
        
        /* 選中狀態 */
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }
        
        /* 大螢幕（如平板）顯示更多 */
        @media (min-width: 400px) {
            .category-btn { flex: 1 1 calc(25% - 10px); } /* 一行四個 */
        }
        @media (min-width: 600px) {
            .category-btn { flex: 1 1 calc(16.66% - 10px); } /* 一行六個 */
        }
        
        /* 歷史紀錄列表樣式 (保持不變) */
        .list-container { max-height: 300px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        .tag { background: #eef2f7; padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; align-self: flex-start; color: #555;}
        .date { color: #aaa; font-size: 0.75rem; margin-top: 4px; }
        .item-right { display: flex; align-items: center; gap: 12px; }
        .amount { font-weight: 700; font-size: 1.1rem; }
        .btn-delete { background: none; color: var(--danger); padding: 5px; margin: 0; width: auto; font-size: 0.9rem;}
    </style>
</head>
<body>

    <div class="card">
        <h2>本月總花費</h2>
        <div class="total-amount">$<span id="total">0</span></div>
    </div>

    <div class="card">
        <h2>新增消費</h2>
        <input type="number" id="amount" placeholder="輸入金額" inputmode="decimal">
        
        <div class="category-picker" id="category-picker">
            <button type="button" class="category-btn active" onclick="selectCategory('🍔 餐飲', this)">
                <span class="icon">🍔</span>
                <span class="label">餐飲</span>
            </button>
            <button type="button" class="category-btn" onclick="selectCategory('🚗 交通', this)">
                <span class="icon">🚗</span>
                <span class="label">交通</span>
            </button>
            <button type="button" class="category-btn" onclick="selectCategory('🎬 娛樂', this)">
                <span class="icon">🎬</span>
                <span class="label">娛樂</span>
            </button>
            <button type="button" class="category-btn" onclick="selectCategory('🛍️ 購物', this)">
                <span class="icon">🛍️</span>
                <span class="label">購物</span>
            </button>
            <button type="button" class="category-btn" onclick="selectCategory('🏠 居家', this)">
                <span class="icon">🏠</span>
                <span class="label">居家</span>
            </button>
            <button type="button" class="category-btn" onclick="selectCategory('📦 其他', this)">
                <span class="icon">📦</span>
                <span class="label">其他</span>
            </button>
        </div>
        
        <button class="btn-save" onclick="addRecord()">儲存紀錄</button>
    </div>

    <div class="card">
        <h2>歷史紀錄</h2>
        <div class="list-container" id="history-list">
            </div>
    </div>

    <div style="padding: 0 10px;">
        <button class="btn-backup" onclick="exportToCSV()">備份資料 (匯出 Excel CSV)</button>
    </div>

    <script>
        const FILE_NAME = "accounting_data_v1.json";
        let records = [];
        let selectedCategory = "🍔 餐飲"; // 預設選中的分類

        // 初始化並從 iOS OPFS 檔案系統讀取資料
        async function init() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(FILE_NAME, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                console.error("OPFS 讀取失敗:", e);
                records = JSON.parse(localStorage.getItem('accounting_records')) || [];
            }
            render();
        }

        // 將資料寫入 iOS 檔案系統
        async function saveToLocal() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(FILE_NAME, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                console.error("OPFS 寫入失敗:", e);
                localStorage.setItem('accounting_records', JSON.stringify(records));
            }
        }

        // 新函式：處理分類選擇點擊
        function selectCategory(category, buttonElement) {
            selectedCategory = category; // 更新選中分類的值

            // 移除所有按鈕的 active 類
            const allButtons = document.querySelectorAll('.category-btn');
            allButtons.forEach(btn => btn.classList.remove('active'));

            // 將 active 類新增到點擊的按鈕
            buttonElement.classList.add('active');
        }

        // 新增記帳紀錄
        async function addRecord() {
            const amountInput = document.getElementById('amount');
            
            const amount = parseFloat(amountInput.value);
            const category = selectedCategory; // 使用全域選中分類值

            if (isNaN(amount) || amount <= 0) {
                alert('請輸入正確的金額！');
                return;
            }

            const newRecord = {
                id: Date.now(),
                amount: amount,
                category: category,
                date: new Date().toLocaleDateString()
            };

            records.unshift(newRecord);
            await saveToLocal();
            
            amountInput.value = '';
            // 保持當前選中的分類，便於連續記錄相同分類
            render();
        }

        // 刪除單筆紀錄
        async function deleteRecord(id) {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                records = records.filter(r => r.id !== id);
                await saveToLocal();
                render();
            }
        }

        // 渲染畫面
        function render() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            
            listContainer.innerHTML = '';
            let total = 0;

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">目前尚無消費紀錄</div>`;
                totalContainer.innerText = '0';
                return;
            }

            records.forEach(r => {
                total += r.amount;
                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag">${r.category}</span>
                            <span class="date">${r.date}</span>
                        </div>
                        <div class="item-right">
                            <span class="amount">$${r.amount.toLocaleString()}</span>
                            <button class="btn-delete" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalContainer.innerText = total.toLocaleString();
        }

        // 匯出資料為 CSV 檔
        function exportToCSV() {
            if (records.length === 0) {
                alert("目前沒有任何資料可以匯出喔！");
                return;
            }
            let csvContent = "\uFEFF日期,消費分類,金額\n"; 
            records.forEach(r => {
                // 如果分類含有逗號，用引號包起來，防止 CSV 格式出錯
                const category = r.category.includes(',') ? `"${r.category}"` : r.category;
                csvContent += `${r.date},${category},${r.amount}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.setAttribute("href", url);
            link.setAttribute("download", `本地記帳本備份_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 啟動
        init();
    </script>
</body>
</html>

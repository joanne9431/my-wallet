<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forest Budget</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">
    
    <!-- 引入舒適自然的 Google 字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* 森林系配色主題 (Forest & Earthy Theme) */
        :root {
            --bg-color: #f1f4f0;   /* 溫和的淺白綠/苔蘚灰底色 */
            --card-bg: #ffffff;    
            --primary: #3a5f43;    /* 森林深綠 */
            --primary-hover: #2d4a34;
            --danger: #a64b4b;     /* 泥土磚紅 */
            --success: #5e8c61;    /* 鼠尾草綠 */
            --warning: #d4a373;    /* 橡木暖橘/沙色 */
            --text: #2b3a2f;       /* 深松針綠灰（取代純黑，視覺更溫和） */
            --grey: #d3dad2;       /* 淺葉灰 */
            
            /* 各種消費種類的療癒大自然色系 Highlight 背景 */
            --hl-food: #fcf1eb;    /* Food: 暖杏色 */
            --hl-food-txt: #a96b43;
            --hl-trans: #e5f0ee;   /* Transport: 湖水綠 */
            --hl-trans-txt: #3d7068;
            --hl-play: #ebe7f5;    /* Entertainment: 暮紫 */
            --hl-play-txt: #6d5b95;
            --hl-shop: #f7edd3;    /* Shopping: 麥芽黃 */
            --hl-shop-txt: #a0783a;
            --hl-home: #e2ede2;    /* Home: 薄荷綠 */
            --hl-home-txt: #3b693e;
            --hl-other: #eae6df;   /* Others: 淺岩灰 */
            --hl-other-txt: #6b6359;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 12px; 
            padding-top: 0; 
            letter-spacing: -0.1px;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px; 
            box-shadow: 0 4px 12px rgba(43, 58, 47, 0.04); 
            margin-bottom: 12px;
            border: 1px solid rgba(58, 95, 67, 0.03);
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -12px;
            margin-right: -12px;
            margin-bottom: 16px;
            padding: 20px 16px;
            background: linear-gradient(135deg, #ffffff 0%, #f7f9f6 100%);
            border-bottom: 1px solid rgba(58, 95, 67, 0.06);
        }
        
        h2 { 
            margin-top: 0; 
            font-size: 0.8rem; 
            color: #647567; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            margin-bottom: 8px; 
        }
        
        .dashboard-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .total-box {
            flex: 1;
            padding-left: 8px; 
            text-align: left;
        }
        .total-amount { 
            font-size: 2rem; 
            font-weight: 800; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -1px;
        }
        
        .category-totals-box {
            flex: 1.4;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            background: rgba(58, 95, 67, 0.04);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(58, 95, 67, 0.02);
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: #435446;
        }
        .cat-total-item .cat-name {
            color: #798c7c;
            font-size: 0.68rem;
            font-weight: 500;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: #2b3a2f;
        }
        
        input[type="number"], input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px 14px; 
            margin: 6px 0;      
            border-radius: 10px;
            border: 1.5px solid var(--grey);
            background-color: #fafbfa;
            box-sizing: border-box;
            font-size: 0.95rem;
            color: var(--text);
            font-family: inherit;
            transition: all 0.2s ease;
            -webkit-appearance: none; 
        }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(58, 95, 67, 0.1);
        } 
        
        /* 編輯日期專用樣式 */
        .edit-date-wrapper {
            display: none; 
            background: #fdfaf2;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px dashed var(--warning);
            margin: 6px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: #9c6e3d;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.85; transform: scale(0.99); } 
        
        .btn-save { 
            background-color: var(--primary); 
            color: white; 
            margin-top: 8px; 
            box-shadow: 0 4px 10px rgba(58, 95, 67, 0.2);
        }
        .btn-save:hover { background-color: var(--primary-hover); }
        
        .btn-backup { 
            background-color: var(--success); 
            color: white; 
            margin-top: 8px; 
            box-shadow: 0 4px 10px rgba(94, 140, 97, 0.2);
        }
        
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 8px;       
            margin: 10px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 8px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 12px;
            padding: 10px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 4px;
            margin: 0;
        }
        .category-btn .icon-label { font-size: 1.1rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: 700; color: #435446; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 8px rgba(58, 95, 67, 0.15);
        }
        .category-btn.active .label {
            color: white;
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: var(--warning);
            color: #5c3e1d;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .list-container { max-height: 280px; overflow-y: auto; }
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            border-bottom: 1px solid #eef1ed; 
        }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            align-self: flex-start; 
        }
        
        .item-details { 
            color: #8c9e8f; 
            font-size: 0.72rem; 
            margin-top: 6px; 
            display: flex; 
            gap: 6px; 
            align-items: center; 
        }
        .note-text { 
            color: #5c5446; 
            font-weight: 500; 
            background: #fdfaf2; 
            padding: 2px 6px; 
            border-radius: 4px; 
            border: 1px solid #f2e9d5; 
        } 

        .item-right { display: flex; align-items: center; gap: 8px; }
        .amount { font-weight: 700; font-size: 1rem; color: var(--text); margin-right: 2px; }
        .btn-action { 
            background: rgba(58, 95, 67, 0.05); 
            padding: 6px 8px; 
            margin: 0; 
            width: auto; 
            font-size: 0.85rem; 
            border-radius: 8px;
            display: inline-block;
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            background: rgba(58, 95, 67, 0.12);
        }
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 8px); } }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2>Monthly Total</h2>
                <div class="total-amount">HK$<span id="total">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="card">
        <h2 id="form-title">Add Transaction</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">🌲 Editing historical record... (will overwrite on save)</div>
        
        <input type="number" id="amount" placeholder="Enter amount" inputmode="decimal">
        <input type="text" id="note" placeholder="Enter notes (e.g., restaurant name, item name)">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Modify Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <h2>History Logs</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px; margin-bottom: 12px;">
        <button class="btn-backup" onclick="exportToCSV()">Backup Data (Export Excel CSV)</button>
    </div>

    <script>
        const DATA_FILE = "accounting_records_v5.json"; 
        
        // 分類選單（英文版面）
        let categories = ["🍔 Food", "🚗 Transport", "🎬 Entertainment", "🛍️ Shopping", "🏠 Home", "📦 Others"];
        
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 

        // 供 CSV 轉換使用的英文月份名稱對照
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // 初始化
        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            await loadRecords();     
            renderCategories();   
            renderRecords();      
        }

        // 讀取本地硬碟檔案
        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                console.error("OPFS 讀取失敗:", e);
                records = JSON.parse(localStorage.getItem('acc_rec_v5')) || [];
            }
        }

        // 寫入本地硬碟檔案
        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                console.error("OPFS 寫入失敗:", e);
                localStorage.setItem('acc_rec_v5', JSON.stringify(records));
            }
        }

        // 渲染分類按鈕
        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }

        // 處理儲存與覆蓋修改
        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); 
            const dateInput = document.getElementById('edit-date');
            
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); 

            if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount!');

            if (editingRecordId !== null) {
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = amount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; 
                    
                    if (dateInput.value) {
                        records[recordIndex].date = dateInput.value;
                    }
                }
                
                // 依照日期最新重新排序
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
                
                editingRecordId = null;
                document.getElementById('form-title').innerText = "Add Transaction";
                document.getElementById('btn-save-main').innerText = "Save Record";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
                document.getElementById('date-field-block').style.display = "none"; 
            } else {
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const isoDateStr = `${yyyy}-${mm}-${dd}`;

                const newRecord = {
                    id: Date.now(), 
                    amount: amount,
                    category: selectedCategory,
                    note: note, 
                    date: isoDateStr 
                };
                records.unshift(newRecord);
                records.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            }

            await saveRecords();     
            amountInput.value = '';  
            noteInput.value = '';  
            renderRecords();         
        }

        // 點擊編輯時觸發
        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; 
            document.getElementById('amount').value = record.amount;
            document.getElementById('note').value = record.note || ''; 
            document.getElementById('edit-date').value = ensureISODate(record.date); 
            selectedCategory = record.category;
            
            document.getElementById('form-title').innerText = "Edit History Record";
            document.getElementById('btn-save-main').innerText = "Update Record";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            document.getElementById('date-field-block').style.display = "block"; 
            
            renderCategories(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                renderRecords();     
            }
        }

        // 依關鍵字自動取得 Highlight 顏色樣式
        function getHighlightStyle(category) {
            const catStr = String(category);
            if (catStr.includes("Food")) {
                return "background-color: var(--hl-food); color: var(--hl-food-txt);";
            } else if (catStr.includes("Transport")) {
                return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";
            } else if (catStr.includes("Entertainment")) {
                return "background-color: var(--hl-play); color: var(--hl-play-txt);";
            } else if (catStr.includes("Shopping")) {
                return "background-color: var(--hl-shop); color: var(--hl-shop-txt);";
            } else if (catStr.includes("Home")) {
                return "background-color: var(--hl-home); color: var(--hl-home-txt);";
            } else {
                return "background-color: var(--hl-other); color: var(--hl-other-txt);";
            }
        }

        // 渲染網頁歷史紀錄清單與各大項目看板金額加總
        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            const catTotalsContainer = document.getElementById('category-totals-container');
            
            listContainer.innerHTML = ''; 
            catTotalsContainer.innerHTML = '';
            
            let total = 0;
            let catSums = {};
            categories.forEach(cat => { catSums[cat] = 0; });

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #8c9e8f; text-align: center; padding: 24px; font-size: 0.9rem;">No transactions yet.</div>`;
                totalContainer.innerText = '0';
                
                categories.forEach(cat => {
                    const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                    catTotalsContainer.innerHTML += `
                        <div class="cat-total-item">
                            <span class="cat-name">${cleanLabel}</span>
                            <span class="cat-num">HK$0</span>
                        </div>`;
                });
                return;
            }

            records.forEach(r => {
                total += r.amount;
                
                if (catSums[r.category] !== undefined) {
                    catSums[r.category] += r.amount;
                } else {
                    catSums[r.category] = r.amount;
                }

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';
                const colorStyle = getHighlightStyle(r.category);
                const displayCategoryLabel = r.category.split(' ').slice(1).join(' ') || r.category;

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${colorStyle}">${displayCategoryLabel}</span>
                            <div class="item-details">
                                <span>${r.date}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="amount">HK$${r.amount.toLocaleString()}</span>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalContainer.innerText = total.toLocaleString();

            Object.keys(catSums).forEach(cat => {
                const cleanLabel = cat.split(' ').slice(1).join(' ') || cat;
                catTotalsContainer.innerHTML += `
                    <div class="cat-total-item">
                        <span class="cat-name">${cleanLabel}</span>
                        <span class="cat-num">HK$${catSums[cat].toLocaleString()}</span>
                    </div>
                `;
            });
        }

        // 安全確保 ISO 日期格式
        function ensureISODate(dateStr) {
            if (dateStr && dateStr.includes('-') && dateStr.split('-').length === 3) {
                return dateStr;
            }
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "2026-06-01"; 
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            } catch(e) {
                return "2026-06-01";
            }
        }

        // 匯出 CSV 流程 (包含英文統計標籤，第一欄維持留白)
        function exportToCSV() {
            if (records.length === 0) return alert("There is no data to export yet!");
            
            let sortedRecords = [...records].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);
            let csvContent = "\uFEFFDate,Category,Amount,Notes\n"; 
            
            let lastIsoDate = "";
            let dayTotal = 0;
            let monthTotal = 0;
            let yearTotal = 0;

            for (let i = 0; i < sortedRecords.length; i++) {
                const r = sortedRecords[i];
                const nextRecord = sortedRecords[i + 1];

                const currentIsoDate = ensureISODate(r.date);
                const parts = currentIsoDate.split('-');
                const currentYear = parts[0];
                const currentMonth = parts[1]; 
                
                const cleanMonthIdx = parseInt(currentMonth, 10) - 1;
                const EnglishMonthLabel = monthNames[cleanMonthIdx] || "Month";

                let nextYear = null;
                let nextMonth = null;
                let nextIsoDate = null;
                if (nextRecord) {
                    nextIsoDate = ensureISODate(nextRecord.date);
                    const nParts = nextIsoDate.split('-');
                    nextYear = nParts[0];
                    nextMonth = nParts[1];
                }

                // 去除分類前的 Emoji 圖示匯出
                const rawCategory = r.category.split(' ').slice(1).join(' ') || r.category;
                const category = rawCategory.includes(',') ? `"${rawCategory}"` : rawCategory;
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');
                const formattedAmount = `HK$${r.amount}`;
                
                let displayDate = "";
                if (currentIsoDate !== lastIsoDate) {
                    displayDate = currentIsoDate;
                    lastIsoDate = currentIsoDate;
                } else {
                    displayDate = ""; 
                }
                
                csvContent += `${displayDate},${category},${formattedAmount},${note}\n`;

                dayTotal += r.amount;
                monthTotal += r.amount;
                yearTotal += r.amount;

                // 當日總計 -> 第一欄留白
                if (!nextRecord || nextIsoDate !== currentIsoDate) {
                    csvContent += `,Daily Total,HK$${dayTotal},\n`;
                    dayTotal = 0; 
                }

                // 每月總計 -> 第一欄留白
                if (!nextRecord || nextYear !== currentYear || nextMonth !== currentMonth) {
                    csvContent += `,${EnglishMonthLabel} Total,HK$${monthTotal},\n`;
                    monthTotal = 0; 
                }

                // 每年總計 -> 第一欄留白
                if (!nextRecord || nextYear !== currentYear) {
                    csvContent += `,Year ${currentYear} Total,HK$${yearTotal},\n`;
                    yearTotal = 0; 
                }
            }
            
            // 下載程序啟動
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Local_Budget_Report_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>

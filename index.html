<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡本地記帳 Pro v4</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="本地記帳">

    <style>
        /* 全域變數（顏色主題） */
        :root {
            --bg-color: #f5f7fa;   
            --card-bg: #ffffff;    
            --primary: #4a90e2;    
            --danger: #ff4d4f;     
            --success: #2ecc71;    
            --warning: #f1c40f;    
            --text: #333333;       
            --grey: #e1e4e8;       
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 50px; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
        }
        
        h2 { margin-top: 0; font-size: 1.1rem; color: #666; font-weight: 600; }
        .total-amount { font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        
        /* 輸入框通用樣式（金額與備註欄位） */
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 1rem;
            -webkit-appearance: none; 
        }
        input:focus { outline: none; border-color: var(--primary); } 
        
        /* 按鈕樣式 */
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.8; } 
        
        .btn-save { background-color: var(--primary); color: white; }
        .btn-backup { background-color: var(--success); color: white; margin-top: 15px; }
        
        /* 分類按鈕版面 */
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 10px;       
            margin: 15px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 10px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--grey);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 6px;
            margin: 0;
        }
        .category-btn .icon-label { font-size: 1.2rem; } 
        .category-btn .label { font-size: 0.9rem; font-weight: bold; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: var(--warning);
            color: #333;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .list-container { max-height: 300px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f2f5; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        .tag { background: #eef2f7; padding: 3px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; align-self: flex-start; color: #555;}
        
        /* 歷史紀錄中的日期與備註小字樣式 */
        .item-details { color: #aaa; font-size: 0.75rem; margin-top: 4px; display: flex; gap: 8px; align-items: center; }
        .note-text { color: #777; font-weight: 500; background: #fffbe6; padding: 1px 4px; border-radius: 4px; } /* 備註加點淡淡的黃底，更易讀 */

        .item-right { display: flex; align-items: center; gap: 8px; }
        .amount { font-weight: 700; font-size: 1.1rem; margin-right: 5px; }
        .btn-action { background: none; padding: 5px; margin: 0; width: auto; font-size: 0.95rem; display: inline-block;}
        
        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 10px); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>本月總花費</h2>
        <div class="total-amount">$<span id="total">0</span></div>
    </div>

    <div class="card">
        <h2 id="form-title">新增消費</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ 正在修改歷史紀錄... (儲存後覆蓋)</div>
        
        <input type="number" id="amount" placeholder="輸入金額" inputmode="decimal">
        
        <input type="text" id="note" placeholder="輸入備註（如：餐廳名字、購買品項）">
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">儲存紀錄</button>
    </div>

    <div class="card">
        <h2>歷史紀錄</h2>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 10px;">
        <button class="btn-backup" onclick="exportToCSV()">備份資料 (匯出 Excel CSV)</button>
    </div>

    <script>
        const DATA_FILE = "accounting_records_v4.json"; // 升級版本號，保持檔案乾淨
        
        // 💡 提示：你可以直接在下方陣列中修改你的預設分類選項
        let categories = ["🍔 餐飲", "🚗 交通", "🎬 娛樂", "🛍️ 購物", "🏠 居家", "📦 其他"];
        
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 

        // 初始化
        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            await loadRecords();     
            renderCategories();   
            renderRecords();      
        }

        // 從 iOS OPFS 安全檔案系統中讀取檔案
        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                console.error("OPFS 讀取失敗:", e);
                records = JSON.parse(localStorage.getItem('acc_rec_v4')) || [];
            }
        }

        // 將最新資料寫入 iOS 檔案系統
        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                console.error("OPFS 寫入失敗:", e);
                localStorage.setItem('acc_rec_v4', JSON.stringify(records));
            }
        }

        // 渲染分類按鈕
        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;

                picker.innerHTML += `
                    <button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)">
                        <span class="icon-label">${icon}</span>
                        <span class="label">${label}</span>
                    </button>
                `;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }

        // 處理「儲存」與「覆蓋修改」
        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); // 抓取備註欄位
            
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); // 去除文字前後的空白

            if (isNaN(amount) || amount <= 0) return alert('請輸入正確的金額！');

            if (editingRecordId !== null) {
                // 【編輯修改模式】
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = amount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; // 💡 更新備註
                }
                
                // 還原回正常新增狀態
                editingRecordId = null;
                document.getElementById('form-title').innerText = "新增消費";
                document.getElementById('btn-save-main').innerText = "儲存紀錄";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
            } else {
                // 【正常新增模式】
                const newRecord = {
                    id: Date.now(), 
                    amount: amount,
                    category: selectedCategory,
                    note: note, // 💡 儲存備註文字
                    date: new Date().toLocaleDateString() 
                };
                records.unshift(newRecord);
            }

            await saveRecords();     
            amountInput.value = '';  
            noteInput.value = '';  // 儲存後自動清空備註欄位
            renderRecords();         
        }

        // 點擊 ✏️ 負責「倒填」資料的函式
        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;

            editingRecordId = id; 
            
            // 將舊資料（含備註）填回上方欄位
            document.getElementById('amount').value = record.amount;
            document.getElementById('note').value = record.note || ''; // 如果以前沒備註，就帶入空字串
            
            selectedCategory = record.category;
            
            // 變更 UI 為修改狀態
            document.getElementById('form-title').innerText = "修改歷史紀錄";
            document.getElementById('btn-save-main').innerText = "更新（覆蓋）紀錄";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            
            renderCategories(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 刪除紀錄
        async function deleteRecord(id) {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                renderRecords();     
            }
        }

        // 渲染歷史紀錄清單
        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            
            listContainer.innerHTML = ''; 
            let total = 0;

            if (records.length === 0) {
                listContainer.innerHTML = `<div style="color: #bbb; text-align: center; padding: 20px; font-size: 0.9rem;">目尚無消費紀錄</div>`;
                totalContainer.innerText = '0';
                return;
            }

            records.forEach(r => {
                total += r.amount;
                
                // 💡 判斷有沒有備註，如果有，就拼裝出 HTML 小字樣式
                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';

                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag">${r.category}</span>
                            <div class="item-details">
                                <span>${r.date}</span>
                                ${noteHTML}
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="amount">$${r.amount.toLocaleString()}</span>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            totalContainer.innerText = total.toLocaleString();
        }

        // 匯出 CSV 備份（備份檔也會包含備註欄位）
        function exportToCSV() {
            if (records.length === 0) return alert("目前沒有任何資料可以匯出喔！");
            let csvContent = "\uFEFF日期,消費分類,金額,備註\n"; // 💡 CSV 開頭加入「備註」欄位
            records.forEach(r => {
                const category = r.category.includes(',') ? `"${r.category}"` : r.category;
                const note = r.note && r.note.includes(',') ? `"${r.note}"` : (r.note || '');
                csvContent += `${r.date},${category},${r.amount},${note}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `本地記帳本備份_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        /* 全域變數（森林系 / 大地色主題） */
        :root {
            --bg-color: #f1f4f1;   /* 溫和的淡草地綠灰 */
            --card-bg: #ffffff;    
            --primary: #3a5f43;    /* 沉穩森林深綠 */
            --primary-light: #4e7c57; /* 茂盛林葉綠 */
            --danger: #c05c46;     /* 溫暖泥土磚紅 */
            --success: #5e8c61;    /* 療癒鼠尾草綠 */
            --warning: #cca043;    /* 暖秋麥芽黃 */
            --text: #222f25;       /* 深松針墨綠 */
            --grey: #d5dbd6;       /* 淺石灰色 */
            
            /* 各種消費種類的 Highlight 顏色背景 */
            --hl-food: #fdf2ee;    
            --hl-food-txt: #b35d46;
            --hl-trans: #eef7f6;   
            --hl-trans-txt: #3d8580;
            --hl-play: #f6f4f8;    
            --hl-play-txt: #715c8c;
            --hl-shop: #fbf8ed;    
            --hl-shop-txt: #a67c2e;
            --hl-home: #edf4ee;    
            --hl-home-txt: #467a4e;
            --hl-other: #f0f2f1;   
            --hl-other-txt: #5c635f;
        }
        
        body {
            font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            padding-top: 0; 
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px; 
            box-shadow: 0 4px 12px rgba(43, 58, 47, 0.04); 
            margin-bottom: 10px;
        }
        
        .top-sticky-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-left: -10px;
            margin-right: -10px;
            margin-bottom: 12px;
            padding: 18px 14px;
            background: linear-gradient(135deg, #ffffff 0%, #f7faf8 100%);
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        
        h2 { 
            margin-top: 0; 
            font-size: 0.85rem; 
            color: #6e7c71; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            margin-bottom: 8px; 
        }
        
        .dashboard-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .total-box {
            flex: 1;
            padding-left: 10px; 
            text-align: left;
            overflow: hidden;
        }
        .total-amount { 
            font-size: clamp(1.1rem, 5.5vw, 1.9rem); 
            font-weight: 800; 
            color: var(--primary); 
            margin-top: 2px;
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            line-height: 1.1;
        }
        
        .category-totals-box {
            flex: 1.3;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            background: rgba(58, 95, 67, 0.03);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(58, 95, 67, 0.05);
            overflow: hidden;
        }
        
        .cat-total-item {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: var(--text);
            overflow: hidden;
        }
        .cat-total-item .cat-name {
            color: #7d8c80;
            font-size: 0.68rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .cat-total-item .cat-num {
            font-weight: 700;
            color: var(--text);
            font-size: clamp(0.68rem, 3.2vw, 0.85rem);
            white-space: nowrap;
            overflow: hidden;
            line-height: 1.1;
        }
        
        input[type="number"], input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 12px 14px; 
            margin: 6px 0;      
            border-radius: 10px;
            border: 1px solid var(--grey);
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fbfcfb;
            color: var(--text);
            transition: all 0.2s;
            -webkit-appearance: none; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(58, 95, 67, 0.1);
        } 
        
        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236e7c71' d='M0 0l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 12px;
            padding-right: 35px;
        }
        
        .edit-date-wrapper {
            display: block; 
            background: #fafbfa;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--grey);
            margin: 6px 0;
        }
        .edit-date-wrapper label {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s;
            -webkit-appearance: none;
            cursor: pointer;
        }
        button:active { opacity: 0.85; transform: scale(0.99); } 
        
        .btn-save { background-color: var(--primary); color: white; margin-top: 8px; }
        .btn-save:hover { background-color: var(--primary-light); }
        .btn-backup { background-color: var(--success); color: white; margin-top: 8px; }
        .btn-backup:hover { opacity: 0.95; }
        .btn-import { background-color: #5c635f; color: white; margin-top: 6px; }
        .btn-import:hover { opacity: 0.95; }
        
        .category-picker {
            display: flex;
            flex-wrap: wrap; 
            gap: 6px;       
            margin: 10px 0;
        }
        
        .category-btn {
            flex: 1 1 calc(33.33% - 6px); 
            background-color: var(--card-bg);
            color: var(--text);
            border: 1.5px solid var(--grey);
            border-radius: 12px;
            padding: 10px 2px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 4px;
            margin: 0;
            font-family: inherit;
        }
        .category-btn .icon-label { font-size: 1.2rem; } 
        .category-btn .label { font-size: 0.75rem; font-weight: 700; } 
        
        .category-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 8px rgba(58, 95, 67, 0.2);
        }
        
        .edit-mode-indicator {
            display: none; 
            background-color: var(--warning);
            color: #3f2e0f;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .list-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .month-selector-inline {
            width: 130px;
            padding: 6px 10px;
            margin: 0;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 8px;
            height: auto;
            background-color: rgba(58, 95, 67, 0.05);
            border: 1px solid rgba(58, 95, 67, 0.15);
            color: var(--primary);
        }

        .list-container { max-height: 320px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eef1ee; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        
        .tag { 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            align-self: flex-start; 
        }
        
        .item-details { color: #829285; font-size: 0.72rem; margin-top: 5px; display: flex; gap: 8px; align-items: center; }
        .note-text { color: var(--text); font-weight: 600; background: #faf8f0; padding: 1px 6px; border-radius: 4px; border: 1px solid #eadebe; } 

        .item-right { display: flex; align-items: center; gap: 8px; }
        .amount { font-weight: 700; font-size: 1.05rem; margin-right: 2px; color: var(--text); }
        .btn-action { background: none; padding: 6px; margin: 0; width: auto; font-size: 0.95rem; display: inline-block; }
        .btn-action:active { transform: scale(0.9); }
        
        .day-separator {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            margin: 12px 0 6px 0;
            letter-spacing: 0.5px;
        }
        .day-separator::before, .day-separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px dashed rgba(58, 95, 67, 0.25);
        }
        .day-separator:not(:empty)::before { margin-right: .5em; }
        .day-separator:not(:empty)::after { margin-left: .5em; }
        .day-dot { display: inline-block; width: 5px; height: 5px; background-color: var(--success); border-radius: 50%; margin-right: 5px; vertical-align: middle; }

        @media (min-width: 400px) { .category-btn { flex: 1 1 calc(25% - 6px); } }
    </style>
</head>
<body>

    <div class="card top-sticky-card">
        <div class="dashboard-layout">
            <div class="total-box">
                <h2 id="current-month-heading">Current Month Total</h2>
                <div class="total-amount">$<span id="total">0</span></div>
            </div>
            <div class="category-totals-box" id="category-totals-container"></div>
        </div>
    </div>

    <div class="card">
        <h2 id="form-title">Add Transaction</h2>
        
        <div id="edit-indicator" class="edit-mode-indicator">✏️ Editing record... (will overwrite on save)</div>
        
        <input type="number" id="amount" placeholder="Enter amount" inputmode="decimal">
        <input type="text" id="note" placeholder="Enter notes">
        
        <div class="edit-date-wrapper" id="date-field-block">
            <label for="edit-date">Transaction Date:</label>
            <input type="date" id="edit-date">
        </div>
        
        <div class="category-picker" id="category-picker"></div>
        
        <button class="btn-save" id="btn-save-main" onclick="handleSubmit()">Save Record</button>
    </div>

    <div class="card">
        <div class="list-header-flex">
            <h2>History Logs</h2>
            <select id="month-filter-dropdown" class="month-selector-inline" onchange="renderRecords()"></select>
        </div>
        <div class="list-container" id="history-list"></div>
    </div>

    <div style="padding: 0 2px;">
        <button class="btn-backup" onclick="exportToExcelXLSX()">Export Excel File</button>
        <input type="file" id="import-file-input" accept=".json,.csv,.xlsx,.xls" style="display: none;" onchange="handleFileImport(this)">
        <button class="btn-import" onclick="document.getElementById('import-file-input').click()">Import Data (JSON/Excel/CSV)</button>
    </div>

    <script>
        const DATA_FILE = "accounting_records_v5.json"; 
        let categories = ["🍔 Food", "🚗 Transport", "🎬 Entertainment", "🛍️ Shopping", "🏠 Home", "📦 Others"];
        let records = [];           
        let selectedCategory = "";  
        let editingRecordId = null; 
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

        async function init() {
            if(categories.length > 0) selectedCategory = categories[0];
            resetDateInputToToday();
            await loadRecords();     
            renderCategories();   
            updateMonthFilterOptions();
            renderRecords();      
        }

        function resetDateInputToToday() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('edit-date').value = `${yyyy}-${mm}-${dd}`;
        }

        async function loadRecords() {
            try {
                const root = await navigator.storage.getDirectory(); 
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const file = await fileHandle.getFile();
                const text = await file.text();
                records = text ? JSON.parse(text) : [];
            } catch (e) {
                records = JSON.parse(localStorage.getItem('acc_rec_v5')) || [];
            }
        }

        async function saveRecords() {
            try {
                const root = await navigator.storage.getDirectory();
                const fileHandle = await root.getFileHandle(DATA_FILE, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(records));
                await writable.close();
            } catch (e) {
                localStorage.setItem('acc_rec_v5', JSON.stringify(records));
            }
        }

        function renderCategories() {
            const picker = document.getElementById('category-picker');
            picker.innerHTML = ''; 
            categories.forEach(cat => {
                const isActive = (cat === selectedCategory) ? 'active' : '';
                const parts = cat.split(' ');
                const icon = parts.length > 1 ? parts[0] : '📝';
                const label = parts.length > 1 ? parts.slice(1).join(' ') : cat;
                picker.innerHTML += `<button type="button" class="category-btn ${isActive}" onclick="selectCategory('${cat}', this)"><span class="icon-label">${icon}</span><span class="label">${label}</span></button>`;
            });
        }

        function selectCategory(cat, btn) {
            selectedCategory = cat; 
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }

        function updateMonthFilterOptions() {
            const dropdown = document.getElementById('month-filter-dropdown');
            const prevSelected = dropdown.value; 
            
            dropdown.innerHTML = '';
            
            let today = new Date();
            let year = today.getFullYear();
            let month = today.getMonth(); 
            
            // 1. 先建立固定包含過去 6 個月（含當月）的 Set 集合
            let filterMonthsSet = new Set();
            for (let i = 0; i < 6; i++) {
                let displayYear = year;
                let displayMonth = month - i;
                
                if (displayMonth < 0) {
                    displayMonth += 12;
                    displayYear -= 1;
                }
                
                let monthStr = String(displayMonth + 1).padStart(2, '0');
                let monthKey = `${displayYear}-${monthStr}`;
                filterMonthsSet.add(monthKey);
            }

            // 2. 檢查現有的記帳紀錄，如果含有更未來的月份，也一併塞入 Set
            const currentMonthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
            records.forEach(r => {
                const recordIsoDate = ensureISODate(r.date);
                const recordMonthKey = recordIsoDate.substring(0, 7); // 擷取 "YYYY-MM"
                
                if (recordMonthKey > currentMonthKey) {
                    filterMonthsSet.add(recordMonthKey);
                }
            });

            // 3. 將所有集合內的月份依字串降冪排序（最新/最遠的未來排在最上面）
            let sortedMonths = Array.from(filterMonthsSet).sort((a, b) => b.localeCompare(a));

            // 4. 渲染至下拉選單
            sortedMonths.forEach(m => {
                const parts = m.split('-');
                const y = parts[0];
                const monthIndex = parseInt(parts[1], 10) - 1;
                const label = `${monthNames[monthIndex]} ${y}`;
                dropdown.innerHTML += `<option value="${m}">${label}</option>`;
            });
            
            // 5. 回復先前的選擇，若沒選擇過，則預設鎖定為當月（若當月不在列表中，則預設選最新的未來月份）
            if (prevSelected && sortedMonths.includes(prevSelected)) {
                dropdown.value = prevSelected;
            } else {
                dropdown.value = sortedMonths.includes(currentMonthKey) ? currentMonthKey : sortedMonths[0]; 
            }
        }

        async function handleSubmit() {
            const amountInput = document.getElementById('amount');
            const noteInput = document.getElementById('note'); 
            const dateInput = document.getElementById('edit-date');
            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim(); 

            if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount!');
            
            let chosenDate = dateInput.value;
            if(!chosenDate) {
                const now = new Date();
                chosenDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            }

            if (editingRecordId !== null) {
                const recordIndex = records.findIndex(r => r.id === editingRecordId);
                if(recordIndex !== -1) {
                    records[recordIndex].amount = amount;
                    records[recordIndex].category = selectedCategory;
                    records[recordIndex].note = note; 
                    records[recordIndex].date = chosenDate;
                }
                editingRecordId = null;
                document.getElementById('form-title').innerText = "Add Transaction";
                document.getElementById('btn-save-main').innerText = "Save Record";
                document.getElementById('btn-save-main').style.backgroundColor = "var(--primary)";
                document.getElementById('edit-indicator').style.display = "none"; 
            } else {
                records.unshift({ id: Date.now(), amount: amount, category: selectedCategory, note: note, date: chosenDate });
            }
            
            await saveRecords();     
            amountInput.value = ''; noteInput.value = ''; 
            resetDateInputToToday();
            updateMonthFilterOptions();
            renderRecords();         
        }

        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if(!record) return;
            editingRecordId = id; 
            document.getElementById('amount').value = record.amount;
            document.getElementById('note').value = record.note || ''; 
            document.getElementById('edit-date').value = ensureISODate(record.date); 
            selectedCategory = record.category;
            document.getElementById('form-title').innerText = "Edit History Record";
            document.getElementById('btn-save-main').innerText = "Update Record";
            document.getElementById('btn-save-main').style.backgroundColor = "var(--warning)";
            document.getElementById('edit-indicator').style.display = "block";
            renderCategories(); window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRecord(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                records = records.filter(r => r.id !== id);
                await saveRecords(); 
                updateMonthFilterOptions();
                renderRecords();     
            }
        }

        function getHighlightStyle(category) {
            const catStr = String(category);
            if (catStr.includes("Food")) return "background-color: var(--hl-food); color: var(--hl-food-txt);";
            if (catStr.includes("Transport")) return "background-color: var(--hl-trans); color: var(--hl-trans-txt);";
            if (catStr.includes("Entertainment")) return "background-color: var(--hl-play); color: var(--hl-play-txt);";
            if (catStr.includes("Shopping")) return "background-color: var(--hl-shop); color: var(--hl-shop-txt);";
            if (catStr.includes("Home")) return "background-color: var(--hl-home); color: var(--hl-home-txt);";
            return "background-color: var(--hl-other); color: var(--hl-other-txt);";
        }

        function renderRecords() {
            const listContainer = document.getElementById('history-list');
            const totalContainer = document.getElementById('total');
            const catTotalsContainer = document.getElementById('category-totals-container');
            const headingContainer = document.getElementById('current-month-heading');
            const dropdown = document.getElementById('month-filter-dropdown');
            
            listContainer.innerHTML = ''; catTotalsContainer.innerHTML = '';
            
            const selectedMonthKey = dropdown.value || `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
            const parts = selectedMonthKey.split('-');
            const viewYear = parts[0];
            const viewMonthIndex = parseInt(parts[1], 10) - 1;
            
            headingContainer.innerText = `${monthNames[viewMonthIndex]} Total (${viewYear})`;

            let currentMonthTotal = 0; 
            let catSums = {};
            categories.forEach(cat => { catSums[cat] = 0; });

            let currentMonthRecords = records.filter(r => {
                const recordIsoDate = ensureISODate(r.date);
                return recordIsoDate.startsWith(selectedMonthKey);
            });

            if (currentMonthRecords.length === 0) {
                listContainer.innerHTML = `<div style="color: #829285; text-align: center; padding: 20px; font-size: 0.9rem;">No transactions in this month.</div>`;
                totalContainer.innerText = '0';
                document.querySelector('.total-amount').style.fontSize = "clamp(1.1rem, 5.5vw, 1.9rem)";
                categories.forEach(cat => {
                    catTotalsContainer.innerHTML += `<div class="cat-total-item"><span class="cat-name">${cat.split(' ').slice(1).join(' ') || cat}</span><span class="cat-num">$0</span></div>`;
                });
                return;
            }

            currentMonthRecords.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

            let lastDisplayedDate = "";

            currentMonthRecords.forEach(r => {
                const recordIsoDate = ensureISODate(r.date);
                
                currentMonthTotal += r.amount;
                if (catSums[r.category] !== undefined) catSums[r.category] += r.amount;

                if (recordIsoDate !== lastDisplayedDate) {
                    const dateObj = new Date(recordIsoDate);
                    const dayOfWeek = isNaN(dateObj.getTime()) ? "" : ` ${dayNames[dateObj.getDay()]}`;
                    listContainer.innerHTML += `<div class="day-separator"><span class="day-dot"></span>${recordIsoDate}${dayOfWeek}</div>`;
                    lastDisplayedDate = recordIsoDate;
                }

                const noteHTML = r.note ? `<span class="note-text">${r.note}</span>` : '';
                listContainer.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <span class="tag" style="${getHighlightStyle(r.category)}">${r.category.split(' ').slice(1).join(' ') || r.category}</span>
                            <div class="item-details">${noteHTML}</div>
                        </div>
                        <div class="item-right">
                            <span class="amount">$${r.amount.toLocaleString()}</span>
                            <button class="btn-action" onclick="startEdit(${r.id})">✏️</button>
                            <button class="btn-action" onclick="deleteRecord(${r.id})">🗑️</button>
                        </div>
                    </div>`;
            });
            
            const formattedTotalStr = currentMonthTotal.toLocaleString();
            totalContainer.innerText = formattedTotalStr;
            
            let mainTotalElement = document.querySelector('.total-amount');
            if (formattedTotalStr.length > 12) {
                mainTotalElement.style.fontSize = "3.4vw";
            } else if (formattedTotalStr.length > 9) {
                mainTotalElement.style.fontSize = "4.2vw";
            } else if (formattedTotalStr.length > 6) {
                mainTotalElement.style.fontSize = "5.0vw";
            } else {
                mainTotalElement.style.fontSize = "clamp(1.1rem, 5.5vw, 1.9rem)";
            }

            Object.keys(catSums).forEach(cat => {
                const rawAmtStr = catSums[cat].toLocaleString();
                let extraStyle = "";
                if(rawAmtStr.length > 12) {
                    extraStyle = "style='font-size: 1.8vw;'";
                } else if(rawAmtStr.length > 9) {
                    extraStyle = "style='font-size: 2.3vw;'";
                }
                catTotalsContainer.innerHTML += `<div class="cat-total-item"><span class="cat-name">${cat.split(' ').slice(1).join(' ') || cat}</span><span class="cat-num" ${extraStyle}>$${rawAmtStr}</span></div>`;
            });
        }

        function ensureISODate(dateStr) {
            if (!dateStr) return "2026-06-01";
            let clean = String(dateStr).trim();
            if (clean.includes('-') && clean.split('-').length === 3) return clean;
            
            if (clean.includes('/')) {
                const p = clean.split('/');
                if (p.length === 3) {
                    if (p[0].length === 4) return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
                    let d = p[0].padStart(2, '0');
                    let m = p[1].padStart(2, '0');
                    let y = p[2];
                    if (y.length === 2) y = "20" + y;
                    return `${y}-${m}-${d}`;
                }
            }
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return "2026-06-01"; 
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            } catch(e) {
                return "2026-06-01";
            }
        }

        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');

            reader.onload = async function(e) {
                try {
                    let importedRecords = [];
                    let baseTimestamp = Date.now(); 

                    if (isExcel) {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        let recordCounter = 0;

                        workbook.SheetNames.forEach(sheetName => {
                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                            
                            let lastValidDate = "";

                            for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || row.length === 0) continue;

                                let dateStr = row[0] ? String(row[0]).trim() : "";
                                let catLabel = row[1] ? String(row[1]).trim() : "";
                                let amtStr = row[2] ? String(row[2]).trim() : "";
                                let noteStr = row[3] ? String(row[3]).trim() : "";

                                if (!catLabel || catLabel.includes('Total') || catLabel === 'Category' || (dateStr === "" && catLabel === "")) {
                                    continue;
                                }

                                if (dateStr === "") {
                                    dateStr = lastValidDate;
                                } else {
                                    dateStr = ensureISODate(dateStr);
                                    lastValidDate = dateStr;
                                }
                                if (!dateStr) continue;

                                amtStr = amtStr.replace('HK$', '').replace('$', '').replace(/,/g, '').replace(/"/g, '');
                                const amount = parseFloat(amtStr);
                                if (isNaN(amount)) continue;

                                let finalCategory = categories.find(c => c.includes(catLabel)) || "📦 Others";
                                
                                recordCounter++;
                                importedRecords.push({
                                    id: baseTimestamp - recordCounter,
                                    amount: amount,
                                    category: finalCategory,
                                    note: noteStr,
                                    date: dateStr
                                });
                            }
                        });

                        if (importedRecords.length === 0) throw new Error("No valid data rows found in Excel file.");
                        records = importedRecords;

                    } else if (file.name.endsWith('.json')) {
                        const parsed = JSON.parse(e.target.result);
                        if (Array.isArray(parsed)) records = parsed;
                        else throw new Error("Invalid JSON format");

                    } else if (file.name.endsWith('.csv')) {
                        const lines = e.target.result.split('\n');
                        let lastValidDate = ""; 
                        let recordCounter = 0;
                        for (let i = 1; i < lines.length; i++) {
                            let line = lines[i].trim();
                            if (!line) continue;
                            if (line.startsWith('\uFEFF')) line = line.replace('\uFEFF', '');
                            const cols = line.split(',');
                            if (cols.length < 3) continue;
                            
                            let dateStr = cols[0].trim();
                            const catLabel = cols[1].trim();
                            let amtStr = cols[2].trim();
                            const noteStr = cols[3] ? cols[3].replace(/"/g, '').trim() : '';
                            
                            if (catLabel.includes('Total') || catLabel === 'Date' || (dateStr === "" && catLabel === "")) continue;
                            
                            if (dateStr === "") {
                                dateStr = lastValidDate;
                            } else {
                                dateStr = ensureISODate(dateStr);
                                lastValidDate = dateStr; 
                            }
                            if (!dateStr) continue;
                            
                            amtStr = amtStr.replace('HK$', '').replace('$', '').replace(/,/g, '').replace(/"/g, '');
                            const amount = parseFloat(amtStr);
                            if (isNaN(amount)) continue;
                            
                            let finalCategory = categories.find(c => c.includes(catLabel)) || "📦 Others";
                            recordCounter++;
                            importedRecords.push({ 
                                id: baseTimestamp - recordCounter, 
                                amount: amount, 
                                category: finalCategory, 
                                note: noteStr, 
                                date: dateStr 
                            });
                        }
                        if (importedRecords.length === 0) return alert("No valid records found in CSV!");
                        records = importedRecords;
                    }

                    await saveRecords(); 
                    updateMonthFilterOptions();
                    renderRecords(); 
                    alert(`Successfully imported ${records.length} records in Excel order!`);
                } catch(err) {
                    alert("Import failed! " + err.message);
                }
                input.value = ''; 
            };

            if (isExcel) {
                reader.readAsArrayBuffer(file);
            } else {
                reader.readAsText(file);
            }
        }

        function exportToExcelXLSX() {
            if (records.length === 0) return alert("There is no data to export yet!");
            if (typeof XLSX === 'undefined') return alert("SheetJS library not loaded yet, please check internet connection.");

            let availableYears = new Set();
            records.forEach(r => {
                let year = ensureISODate(r.date).split('-')[0];
                availableYears.add(year);
            });
            let sortedYears = Array.from(availableYears).sort((a, b) => b - a); 

            const sysDate = new Date();
            const currentSystemYear = String(sysDate.getFullYear());
            let selectedYear = currentSystemYear;

            if (sortedYears.length > 1) {
                let yearPrompt = prompt(
                    `Detected data across multiple years.\nAvailable years: ${sortedYears.join(', ')}\n\nPlease enter the year you want to export:`, 
                    currentSystemYear
                );
                
                if (yearPrompt === null) return; 
                yearPrompt = yearPrompt.trim();
                
                if (!sortedYears.includes(yearPrompt)) {
                    return alert(`Invalid year choice! Please run export again and type one of: ${sortedYears.join(', ')}`);
                }
                selectedYear = yearPrompt;
            } else if (sortedYears.length === 1) {
                selectedYear = sortedYears[0];
            }

            let filteredRecords = records.filter(r => ensureISODate(r.date).startsWith(selectedYear));
            
            if (filteredRecords.length === 0) {
                return alert(`No data found for the year ${selectedYear}.`);
            }

            let yearTotal = 0;
            filteredRecords.forEach(r => yearTotal += r.amount);

            let monthlyGroups = {};
            let allMonthsChronological = [];
            
            filteredRecords.forEach(r => {
                let isoDate = ensureISODate(r.date);
                let yearMonth = isoDate.substring(0, 7); 
                if (!monthlyGroups[yearMonth]) {
                    monthlyGroups[yearMonth] = [];
                    allMonthsChronological.push(yearMonth);
                }
                monthlyGroups[yearMonth].push(r);
            });

            allMonthsChronological.sort((a, b) => a.localeCompare(b));
            let latestMonthKey = allMonthsChronological[allMonthsChronological.length - 1];
            
            let sheetsOrder = [...allMonthsChronological].reverse();

            const currentSystemMonthKey = `${sysDate.getFullYear()}-${String(sysDate.getMonth() + 1).padStart(2, '0')}`;
            if (sheetsOrder.includes(currentSystemMonthKey) && sheetsOrder[0] !== currentSystemMonthKey) {
                sheetsOrder = sheetsOrder.filter(m => m !== currentSystemMonthKey);
                sheetsOrder.unshift(currentSystemMonthKey);
            }

            let wb = XLSX.utils.book_new();

            sheetsOrder.forEach(currentMonthKey => {
                let monthRecords = monthlyGroups[currentMonthKey];
                
                monthRecords.sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

                let sheetRows = [
                    ["Date", "Category", "Amount", "Notes"]
                ];

                let dayTotal = 0;
                let monthTotal = 0;
                let lastDisplayedDate = "";

                monthRecords.forEach(r => monthTotal += r.amount);

                for (let i = 0; i < monthRecords.length; i++) {
                    let r = monthRecords[i];
                    let nextRecord = monthRecords[i + 1];

                    let currentIsoDate = ensureISODate(r.date);
                    let parts = currentMonthKey.split('-');
                    let currentMonth = parts[1];

                    let nextIsoDate = nextRecord ? ensureISODate(nextRecord.date) : null;
                    let rawCategory = r.category.split(' ').slice(1).join(' ') || r.category;
                    let noteText = r.note || '';

                    let dateValue = "";
                    if (currentIsoDate !== lastDisplayedDate) {
                        dateValue = currentIsoDate;
                        lastDisplayedDate = currentIsoDate;
                    }

                    sheetRows.push([dateValue, rawCategory, `HK$${r.amount.toLocaleString()}`, noteText]);
                    dayTotal += r.amount;

                    let isDayEnd = !nextRecord || nextIsoDate !== currentIsoDate;
                    let isMonthEnd = !nextRecord;

                    if (isDayEnd) {
                        sheetRows.push(["", "Daily Total", `HK$${dayTotal.toLocaleString()}`, ""]);
                        dayTotal = 0; 
                        if (!isMonthEnd) {
                            sheetRows.push(["", "", "", ""]);
                        }
                    }

                    if (isMonthEnd) {
                        let EnglishMonthLabel = monthNames[parseInt(currentMonth, 10) - 1] || "Month";
                        sheetRows.push(["", "", "", ""]); 
                        sheetRows.push(["", `${EnglishMonthLabel} Total`, `HK$${monthTotal.toLocaleString()}`, ""]);

                        if (currentMonthKey === latestMonthKey) {
                            sheetRows.push(["", "", "", ""]); 
                            sheetRows.push(["", `${selectedYear} Annual Total`, `HK$${yearTotal.toLocaleString()}`, ""]);
                        } else {
                            sheetRows.push(["", "", "", ""]);
                        }
                    }
                }

                let ws = XLSX.utils.aoa_to_sheet(sheetRows);
                ws['!cols'] = [{ wch: 13 }, { wch: 15 }, { wch: 15 }, { wch: 25 }]; 
                XLSX.utils.book_append_sheet(wb, ws, currentMonthKey);
            });

            XLSX.writeFile(wb, `Budget_Report_${selectedYear}_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        init();
    </script>
